<body>
<div class="container">
    <div class="header-controls">
        <h1>📍 db_zip-city3</h1>
        <div class="search-container">
            <button onclick="clearSearch()">Clear Search</button>
            <input type="text" id="searchInput" placeholder="Search city, county, state, zip... (multiple words OK)" autofocus>
        </div>
    </div>
    <div class="controls">
        <div class="buttons">
            <button class="export-btn" onclick="exportCSV()">Export CSV</button>
            <button onclick="exportJSON()">Export JSON</button>
        </div>
        <div class="stats">Showing <strong id="count">0</strong> of <strong id="total">0</strong> records</div>
    </div>
    <div class="table-container">
        <div id="loading" style="text-align:center; padding:80px 20px; font-size:1.2em; color:#64748b;">
            Loading db_zip-city3.csv ...
        </div>
        <table id="dataTable" style="display:none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="pagination" id="pagination" style="padding:10px; text-align:center;"></div>
</div>

<script>
// ==================== AUTO-DETECT FILE ====================
let dataFile = 'db_zip-city.csv';

if (window.location.hostname.includes('github.io')) {
    const parts = window.location.pathname.split('/').filter(Boolean);
    const username = parts[0];
    const repo = parts[1];
    dataFile = `https://raw.githubusercontent.com/${username}/${repo}/main/db_zip-city.csv`;
}

console.log("📡 Loading from:", dataFile);

let data = [];
let filteredData = [];
let headers = [];
let currentPage = 1;
const rowsPerPage = 100;
let filterTimeout = null;

async function loadPipeFile() {
    const loadingEl = document.getElementById('loading');
    try {
        loadingEl.innerHTML = `Loading ${data.length || '42k'} records... <br><small>This may take 3–8 seconds</small>`;

        const response = await fetch(dataFile);
        
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

        const text = await response.text();
        
        if (text.length < 100) throw new Error("File seems empty");

        const lines = text.trim().split('\n');
        headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));

        data = lines.slice(1).map((line, idx) => {
            // Better CSV parsing that handles commas inside quotes
            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => 
                v.trim().replace(/^"|"$/g, '')
            );
            
            let obj = {};
            headers.forEach((h, i) => {
                let key = h.toLowerCase().replace(/[^a-z0-9]/g, '');
                obj[key] = values[i] || '';
            });

            let city   = obj.city || '';
            let county = obj.county || '';
            let state  = obj.state || '';
            let zip    = obj.zipcode || obj.zip || '';
            let query = [city, county, state, zip].filter(Boolean).join(', ');
            
            obj.googlemaps = query ? 
                `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}` : "#";
            obj.id = idx + 1;
            return obj;
        });

        filteredData = [...data];
        renderTable();

    } catch (e) {
        console.error(e);
        loadingEl.innerHTML = `❌ Failed to load file<br><small>${e.message}</small><br><br>
        Make sure <strong>db_zip-city.csv</strong> exists in the repository.`;
    }
}

// Keep all your other functions (renderTable, filterData, etc.) exactly as they were before
// ... paste the rest of your original script here ...
</script>
